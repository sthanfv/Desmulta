<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Desmulta - Sin Conexión</title>
    <style>
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #000;
        color: #fff;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        margin: 0;
        text-align: center;
      }
      .container {
        padding: 20px;
        background: rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(20px);
        border-radius: 30px;
        border: 1px border rgba(255, 255, 255, 0.1);
        max-width: 80%;
      }
      h1 {
        color: #ffbf00;
        font-size: 1.5rem;
        margin-bottom: 10px;
      }
      p {
        color: rgba(255, 255, 255, 0.7);
        font-size: 0.9rem;
        line-height: 1.5;
      }
      .btn {
        margin-top: 20px;
        padding: 12px 24px;
        background: #ffbf00;
        color: #000;
        border-radius: 50px;
        text-decoration: none;
        font-weight: bold;
        display: inline-block;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Sin Conexión</h1>
      <p>
        Parece que has perdido la señal. No te preocupes, <strong>Desmulta</strong> sigue activo
        cuando recuperes la conexión.
      </p>
      <a href="/" class="btn">Reintentar</a>
    </div>
  </body>
</html>
